services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ethos
      POSTGRES_PASSWORD: ethos
      POSTGRES_DB: ethos
    ports:
      - "5432:5432"
    volumes:
      - ethos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ethos_pgdata:
